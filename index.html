<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechFest – April 2026 · IIIT Lucknow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --card-bg: #ffffff;
    --border: #e8e2da;
    --text: #2c2520;
    --text-muted: #8a7e74;
    --accent: #c4501a;
    --online-green: #2d8a4e;
    --offline-red: #c44a2f;
    --online-bg: #e8f5ed;
    --offline-bg: #fce8e4;

    /* Category colors */
    --cat-foss: #2d8a4e;
    --cat-blockchain: #3b6eda;
    --cat-app: #e8a030;
    --cat-gdgweb: #e85830;
    --cat-web: #c44a2f;
    --cat-cp: #d4772c;
    --cat-infosec: #b83a5e;
    --cat-design: #8b5cf6;
    --cat-ml: #2196F3;
    --cat-gdgfoss: #0d9488;
    --cat-gdg: #e85830;

    --timeline-online: #2d8a4e;
    --timeline-offline: #c44a2f;
    --timeline-hybrid: #e8a030;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 24px 32px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .logo {
    line-height: 1;
  }

  .logo h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
  }

  .logo h1 span {
    color: var(--accent);
  }

  .logo p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Filter pills */
  .filters {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  .filter-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 6px;
  }

  .cat-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .cat-pill:hover { border-color: var(--text); }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Right controls */
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .event-count {
    font-size: 13px;
    color: var(--text-muted);
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
  }

  .view-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .view-btn {
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .view-btn.active {
    background: var(--text);
    color: #fff;
  }

  .view-btn:hover:not(.active) { color: var(--text); }

  /* ── Timeline ── */
  .timeline-section {
    padding: 12px 32px 0;
  }

  .timeline-legend {
    display: flex;
    gap: 16px;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 600;
  }

  .timeline-legend span { display: flex; align-items: center; gap: 4px; }
  .legend-line {
    width: 20px;
    height: 3px;
    border-radius: 2px;
  }

  .timeline-dates {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 0 6px;
    border-bottom: 1px solid var(--border);
  }

  .timeline-dates .today {
    color: var(--accent);
    font-weight: 600;
  }

  .timeline-bars {
    position: relative;
    padding: 6px 0;
  }

  .t-row {
    display: flex;
    align-items: center;
    height: 28px;
    position: relative;
  }

  .t-label {
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1.5px solid;
    position: absolute;
    left: 0;
    white-space: nowrap;
    background: var(--bg);
    z-index: 2;
  }

  .t-bar {
    height: 8px;
    border-radius: 4px;
    position: absolute;
    opacity: 0.7;
  }

  /* ── Week cards grid ── */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    padding: 16px 32px 32px;
  }

  .day-col {
    border: 1px solid var(--border);
    border-right: none;
    min-height: 300px;
    background: var(--card-bg);
  }

  .day-col:last-child { border-right: 1px solid var(--border); }
  .day-col:first-child { border-radius: 12px 0 0 12px; }
  .day-col:last-child { border-radius: 0 12px 12px 0; }

  .day-header {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card-bg);
    z-index: 1;
  }

  .day-header h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .day-header h3 span {
    font-weight: 400;
    color: var(--text-muted);
  }

  .day-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .day-events {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* Event card */
  .event-card {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    position: relative;
    transition: all 0.2s;
    cursor: default;
    border-left: 3px solid;
  }

  .event-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transform: translateY(-1px);
  }

  .event-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .event-time {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .event-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }

  .event-cat {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .event-mode {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .mode-online {
    color: var(--online-green);
    background: var(--online-bg);
  }

  .mode-offline {
    color: var(--offline-red);
    background: var(--offline-bg);
  }

  .add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    padding: 8px;
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .add-btn:hover {
    border-color: var(--text);
    color: var(--text);
  }

  /* Week navigation */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 0 32px 12px;
  }

  .week-nav-btn {
    padding: 8px 20px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .week-nav-btn:hover { background: var(--text); color: #fff; }
  .week-nav-btn.active { background: var(--text); color: #fff; }

  .week-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    min-width: 140px;
    text-align: center;
  }

  /* Category color mapping on left border */
  .cat-foss { border-left-color: var(--cat-foss); }
  .cat-blockchain { border-left-color: var(--cat-blockchain); }
  .cat-app { border-left-color: var(--cat-app); }
  .cat-gdgweb { border-left-color: var(--cat-gdgweb); }
  .cat-web { border-left-color: var(--cat-web); }
  .cat-cp { border-left-color: var(--cat-cp); }
  .cat-infosec { border-left-color: var(--cat-infosec); }
  .cat-design { border-left-color: var(--cat-design); }
  .cat-ml { border-left-color: var(--cat-ml); }
  .cat-gdgfoss { border-left-color: var(--cat-gdgfoss); }
  .cat-gdg { border-left-color: var(--cat-gdg); }

  /* Responsive */
  @media (max-width: 1100px) {
    .week-grid { grid-template-columns: repeat(4, 1fr); }
    .day-col:nth-child(4) { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; }
    .day-col:nth-child(5) { border-radius: 12px 0 0 12px; margin-top: 8px; }
  }

  @media (max-width: 700px) {
    .week-grid { grid-template-columns: 1fr 1fr; padding: 12px 16px; }
    .header { padding: 16px; }
    .timeline-section { padding: 8px 16px 0; display: none; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">
      <h1>Tech<span>Fest</span></h1>
      <p>April 2026 · IIIT Lucknow</p>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('online', this)">Online</button>
      <button class="filter-btn" onclick="setFilter('offline', this)">Offline</button>
      <button class="filter-btn" onclick="setFilter('hybrid', this)">Hybrid</button>
      <div class="filter-divider"></div>
      <button class="cat-pill" onclick="toggleCat('FOSS')"><span class="cat-dot" style="background:var(--cat-foss)"></span>FOSS</button>
      <button class="cat-pill" onclick="toggleCat('Blockchain')"><span class="cat-dot" style="background:var(--cat-blockchain)"></span>Blockchain</button>
      <button class="cat-pill" onclick="toggleCat('App')"><span class="cat-dot" style="background:var(--cat-app)"></span>App</button>
      <button class="cat-pill" onclick="toggleCat('GDG Web')"><span class="cat-dot" style="background:var(--cat-gdgweb)"></span>GDG Web</button>
      <button class="cat-pill" onclick="toggleCat('Web')"><span class="cat-dot" style="background:var(--cat-web)"></span>Web</button>
      <button class="cat-pill" onclick="toggleCat('CP')"><span class="cat-dot" style="background:var(--cat-cp)"></span>CP</button>
      <button class="cat-pill" onclick="toggleCat('InfoSec')"><span class="cat-dot" style="background:var(--cat-infosec)"></span>InfoSec</button>
      <button class="cat-pill" onclick="toggleCat('Design')"><span class="cat-dot" style="background:var(--cat-design)"></span>Design</button>
      <button class="cat-pill" onclick="toggleCat('ML')"><span class="cat-dot" style="background:var(--cat-ml)"></span>ML</button>
      <button class="cat-pill" onclick="toggleCat('GDG FoSS')"><span class="cat-dot" style="background:var(--cat-gdgfoss)"></span>GDG FoSS</button>
      <button class="cat-pill" onclick="toggleCat('GDG')"><span class="cat-dot" style="background:var(--cat-gdg)"></span>GDG</button>
    </div>
  </div>
  <div class="header-right">
    <span class="event-count">31 events</span>
    <div class="view-toggle">
      <button class="view-btn active">Split</button>
      <button class="view-btn">Timeline</button>
      <button class="view-btn">Board</button>
    </div>
  </div>
</div>

<!-- Timeline -->
<div class="timeline-section">
  <div class="timeline-legend">
    <span><span class="legend-line" style="background:var(--timeline-online)"></span> <span style="color:var(--timeline-online)">Online</span></span>
    <span><span class="legend-line" style="background:var(--timeline-offline)"></span> <span style="color:var(--timeline-offline)">Offline</span></span>
    <span><span class="legend-line" style="background:var(--timeline-hybrid)"></span> <span style="color:var(--timeline-hybrid)">Hybrid</span></span>
  </div>
  <div class="timeline-dates">
    <span>Apr 6</span><span>Apr 7</span><span>Apr 8</span><span>Apr 9</span>
    <span class="today">Apr 10</span><span>Apr 11</span><span>Apr 12</span>
    <span>Apr 13</span><span>Apr 14</span><span>Apr 15</span><span>Apr 16</span>
    <span>Apr 17</span><span>Apr 18</span>
  </div>
  <div class="timeline-bars" id="timelineBars">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- Week Nav -->
<div class="week-nav">
  <button class="week-nav-btn" id="prevBtn" onclick="switchWeek(0)">← Prev</button>
  <span class="week-label" id="weekLabel">Apr 6 – Apr 12</span>
  <button class="week-nav-btn" id="nextBtn" onclick="switchWeek(1)">Next →</button>
</div>

<!-- Week Grid -->
<div class="week-grid" id="weekGrid">
  <!-- Rendered by JS -->
</div>

<script>
const CAT_CLASS = {
  'FOSS': 'cat-foss', 'Blockchain': 'cat-blockchain', 'App': 'cat-app',
  'GDG Web': 'cat-gdgweb', 'Web': 'cat-web', 'CP': 'cat-cp',
  'InfoSec': 'cat-infosec', 'Design': 'cat-design', 'ML': 'cat-ml',
  'GDG FoSS': 'cat-gdgfoss', 'GDG': 'cat-gdg'
};

const CAT_COLOR = {
  'FOSS': 'var(--cat-foss)', 'Blockchain': 'var(--cat-blockchain)', 'App': 'var(--cat-app)',
  'GDG Web': 'var(--cat-gdgweb)', 'Web': 'var(--cat-web)', 'CP': 'var(--cat-cp)',
  'InfoSec': 'var(--cat-infosec)', 'Design': 'var(--cat-design)', 'ML': 'var(--cat-ml)',
  'GDG FoSS': 'var(--cat-gdgfoss)', 'GDG': 'var(--cat-gdg)'
};

// ── WEEK 1 DATA (Apr 6–12) ──
const week1 = [
  {
    day: 'Mon', date: 'Apr 6', badge: '',
    events: [
      { name: 'RiceFest', time: 'All fest · Apr 6-17', cat: 'FOSS', mode: 'online' },
      { name: 'Contract Battle', time: 'Apr 6 · 48 hrs', cat: 'Blockchain', mode: 'online' },
      { name: 'Appophilia', time: 'Apr 6 · 7 days', cat: 'App', mode: 'online' },
      { name: 'GDG UserRush', time: 'Apr 6 · 7 days', cat: 'GDG Web', mode: 'online' },
      { name: 'Dev Stakes', time: 'Apr 6 · 84 hrs', cat: 'Web', mode: 'online' },
      { name: 'SpeedForces', time: '6:00 PM – 8:30 PM · 2.5 hrs', cat: 'CP', mode: 'offline' },
      { name: 'Comazotz – Day 1', time: '9:30 PM – 12:30 PM · 3 hrs', cat: 'App', mode: 'offline' },
    ]
  },
  {
    day: 'Tue', date: 'Apr 7', badge: '',
    events: [
      { name: 'CodeULapk – App UI Sprint', time: 'Apr 7 · 72 hrs', cat: 'App', mode: 'online' },
      { name: 'Freshers Cup – R1', time: 'Apr 7 · 3 hrs online', cat: 'CP', mode: 'online' },
      { name: 'Design Finish', time: '10:30 PM – 11:30 PM · 1 hr', cat: 'Design', mode: 'offline' },
    ]
  },
  {
    day: 'Wed', date: 'Apr 8', badge: '',
    events: [
      { name: 'Incognito 7.0', time: 'Apr 8 · 48 hrs', cat: 'InfoSec', mode: 'online' },
      { name: 'Silent Poster', time: '10:00 PM – 11:00 PM · 1 hr', cat: 'Design', mode: 'offline' },
      { name: 'Comazotz – Day 2', time: '6:00 PM – 9:00 PM · 3 hrs', cat: 'App', mode: 'offline' },
    ]
  },
  {
    day: 'Thu', date: 'Apr 9', badge: '',
    events: [
      { name: 'Freshers Cup – R2', time: '6:00 PM – 11:00 PM · 5 hrs', cat: 'CP', mode: 'offline' },
      { name: 'PixelForge', time: '11:30 PM – 12:30 AM · 1 hr', cat: 'Design', mode: 'offline' },
    ]
  },
  {
    day: 'Fri', date: 'Apr 10', badge: 'FOSS WKND',
    events: [
      { name: 'FOSS Weekend', time: 'Apr 10-12 · 72 hrs', cat: 'FOSS', mode: 'online' },
    ]
  },
  {
    day: 'Sat', date: 'Apr 11', badge: 'FOSS WKND',
    events: []
  },
  {
    day: 'Sun', date: 'Apr 12', badge: 'FOSS WKND',
    events: []
  },
];

// ── WEEK 2 DATA (Apr 13–18) ──
const week2 = [
  {
    day: 'Mon', date: 'Apr 13', badge: '',
    events: [
      { name: 'Kaggle Cup', time: 'Apr 13 · 72 hrs', cat: 'ML', mode: 'online' },
      { name: 'GDG Fossology', time: 'Apr 13 · 36 hrs online', cat: 'GDG FoSS', mode: 'online' },
      { name: 'Code Arena', time: '6:00 PM – 9:00 PM · 3 hrs', cat: 'CP', mode: 'offline' },
      { name: 'Frontend Sprint', time: '10:00 PM – 11:00 PM', cat: 'Web', mode: 'offline' },
    ]
  },
  {
    day: 'Tue', date: 'Apr 14', badge: '',
    events: [
      { name: 'Language Wars – Session 1', time: '5:30 PM – 8:30 PM · 3 hrs', cat: 'FOSS', mode: 'offline' },

    ]
  },
  {
    day: 'Wed', date: 'Apr 15', badge: '',
    events: [
      { name: 'PersonaLLM', time: 'Apr 15 · 36 hrs', cat: 'ML', mode: 'online' },
      { name: 'Language Wars – Session 2', time: '6:00 PM – 9:00 PM · 3 hrs', cat: 'FOSS', mode: 'offline' },

  },
  {

    ]
  },
  {
    day: 'Fri', date: 'Apr 17', badge: '',
    events: [
      { name: 'Global Contest', time: 'Evening · 3 hrs', cat: 'CP', mode: 'online' },

    ]
  },
  {

    events: [
      { name: 'Code Surgery', time: '11:00 AM – 2:00 PM · 3 hrs', cat: 'Web', mode: 'offline' },
      { name: 'Debug Dash', time: '4:00 PM – 6:00 PM · 2 hrs', cat: 'CP', mode: 'offline' },
      { name: 'Hackofiesta', time: 'Starts 9:00 PM · 36 hrs · Team of 4', cat: 'Blockchain', mode: 'offline' },
    ]
  },
];

// ── Timeline bars data ──
const timelineBars = [
  { label: 'RiceFest', start: 0, end: 12, type: 'online', color: 'var(--timeline-online)' },
  { label: 'Contract Battle', start: 0, end: 2, type: 'online', color: 'var(--timeline-online)' },
  { label: 'Appophilia', start: 0, end: 6.5, type: 'online', color: 'var(--timeline-online)' },
  { label: 'GDG UserRush', start: 0, end: 6.5, type: 'online', color: 'var(--timeline-online)' },
  { label: 'Dev Stakes', start: 0, end: 3.5, type: 'hybrid', color: 'var(--timeline-hybrid)' },
  { label: 'S', start: 0, end: 1, type: 'offline', color: 'var(--timeline-offline)' },
];

let currentWeek = 0;
let activeFilter = 'all';
let activeCats = new Set();

function renderTimeline() {
  const container = document.getElementById('timelineBars');
  container.innerHTML = '';
  timelineBars.forEach(bar => {
    const row = document.createElement('div');
    row.className = 't-row';
    const pct = (n) => (n / 13 * 100) + '%';
    row.innerHTML = `
      <span class="t-label" style="border-color:${bar.color}; color:${bar.color}; left:${pct(bar.start)}">${bar.label}</span>
      <span class="t-bar" style="background:${bar.color}; left:calc(${pct(bar.start)} + 90px); width:calc(${pct(bar.end - bar.start)} - 90px)"></span>
    `;
    container.appendChild(row);
  });
}

function renderWeek() {
  const weeks = [week1, week2];
  const data = weeks[currentWeek];
  const grid = document.getElementById('weekGrid');
  const label = document.getElementById('weekLabel');

  label.textContent = currentWeek === 0 ? 'Apr 6 – Apr 12' : 'Apr 13 – Apr 18';
  document.getElementById('prevBtn').style.opacity = currentWeek === 0 ? '0.4' : '1';
  document.getElementById('nextBtn').style.opacity = currentWeek === 1 ? '0.4' : '1';

  grid.innerHTML = '';
  data.forEach(dayData => {
    const col = document.createElement('div');
    col.className = 'day-col';

    let filtered = dayData.events;
    if (activeFilter === 'online') filtered = filtered.filter(e => e.mode === 'online');
    else if (activeFilter === 'offline') filtered = filtered.filter(e => e.mode === 'offline');
    if (activeCats.size > 0) filtered = filtered.filter(e => activeCats.has(e.cat));

    col.innerHTML = `
      <div class="day-header">
        <h3><span>${dayData.day} · </span>${dayData.date}</h3>
        ${dayData.badge ? `<div class="day-badge">${dayData.badge}</div>` : ''}
      </div>
      <div class="day-events">
        ${filtered.map(ev => `
          <div class="event-card ${CAT_CLASS[ev.cat] || ''}">
            <div class="event-name">${ev.name}</div>
            <div class="event-time">${ev.time}</div>
            <div class="event-footer">
              <span class="event-cat" style="color:${CAT_COLOR[ev.cat] || 'var(--text-muted)'}">${ev.cat}</span>
              <span class="event-mode ${ev.mode === 'online' ? 'mode-online' : 'mode-offline'}">${ev.mode}</span>
            </div>
          </div>
        `).join('')}
        <button class="add-btn">+ add</button>
      </div>
    `;
    grid.appendChild(col);
  });
}

function switchWeek(w) {
  if (w === currentWeek) return;
  currentWeek = w;
  renderWeek();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWeek();
}

function toggleCat(cat) {
  if (activeCats.has(cat)) activeCats.delete(cat);
  else activeCats.add(cat);
  document.querySelectorAll('.cat-pill').forEach(pill => {
    const label = pill.textContent.trim();
    pill.style.borderColor = activeCats.has(label) ? 'var(--text)' : '';
    pill.style.background = activeCats.has(label) ? 'rgba(44,37,32,0.06)' : '';
  });
  renderWeek();
}

// Init
renderTimeline();
renderWeek();
</script>
</body>
</html>
